version: "2"
type: frontend
tech_stack:
  - language: TypeScript
  - framework: Next.js 15 (App Router)
  - ui_library: Tailwind CSS v4
  - other: React 19, MySQL (mysql2/promise), bcryptjs, jose JWT
routes:
  - path: /
    file: app/page.tsx
    auth_required: false
    description: Root page, redirects authenticated users to /todos and unauthenticated users to /login via middleware
  - path: /login
    file: app/login/page.tsx
    auth_required: false
    description: User login page with email and password form
  - path: /register
    file: app/register/page.tsx
    auth_required: false
    description: User registration page with name, email, and password form
  - path: /todos
    file: app/todos/page.tsx
    auth_required: true
    description: Main todo list page for authenticated users; supports add, toggle, edit, delete, filter, and clear completed
features:
  - name: User Registration
    description: Create a new account with name, email, and password (min 8 characters)
    files:
      - app/register/page.tsx
      - app/api/auth/register/route.ts
      - lib/auth.ts
      - lib/db.ts
    entry_route: /register
    user_interactions:
      - Fill name input field
      - Fill email input field
      - Fill password input field (min 8 characters)
      - Click Create account button to submit
      - See error message on duplicate email or validation failure
      - Redirected to /todos on success
    api_calls:
      - method: POST
        endpoint: /api/auth/register
    auth_required: false

  - name: User Login
    description: Sign in with email and password credentials; sets httpOnly JWT cookie on success
    files:
      - app/login/page.tsx
      - app/api/auth/login/route.ts
      - lib/auth.ts
      - lib/db.ts
    entry_route: /login
    user_interactions:
      - Fill email input field
      - Fill password input field
      - Click Sign in button to submit
      - See error message on invalid credentials
      - Redirected to /todos on success
    api_calls:
      - method: POST
        endpoint: /api/auth/login
    auth_required: false

  - name: User Logout
    description: Clears the auth_token cookie and redirects user to /login
    files:
      - app/todos/page.tsx
      - app/api/auth/logout/route.ts
    entry_route: /todos
    user_interactions:
      - Click Logout button in header
      - Redirected to /login
    api_calls:
      - method: POST
        endpoint: /api/auth/logout
    auth_required: true

  - name: View Todo List
    description: Fetch and display all todos for the authenticated user on page load
    files:
      - app/todos/page.tsx
      - app/api/todos/route.ts
      - app/api/auth/me/route.ts
    entry_route: /todos
    user_interactions:
      - View list of todos after page loads
      - See empty state message when no todos exist
    api_calls:
      - method: GET
        endpoint: /api/todos
      - method: GET
        endpoint: /api/auth/me
    auth_required: true

  - name: Add Todo
    description: Create a new todo item by typing a title and submitting the form
    files:
      - app/todos/page.tsx
      - app/api/todos/route.ts
    entry_route: /todos
    user_interactions:
      - Type todo title in the input field
      - Click Add button or press Enter to submit
      - New todo appears at top of the list
    api_calls:
      - method: POST
        endpoint: /api/todos
    auth_required: true

  - name: Toggle Todo Completion
    description: Mark a todo as completed or active by clicking its checkbox
    files:
      - app/todos/page.tsx
      - app/api/todos/[id]/route.ts
    entry_route: /todos
    user_interactions:
      - Click checkbox on a todo item to toggle completed state
      - Completed todos show with strikethrough text
    api_calls:
      - method: PUT
        endpoint: /api/todos/{id}
    auth_required: true

  - name: Edit Todo Title
    description: Edit a todo's title by double-clicking it, then confirming with Enter or blur
    files:
      - app/todos/page.tsx
      - app/api/todos/[id]/route.ts
    entry_route: /todos
    user_interactions:
      - Double-click a todo title to enter edit mode
      - Modify the text in the inline input
      - Press Enter or click away to save changes
      - Press Escape to cancel and revert
    api_calls:
      - method: PUT
        endpoint: /api/todos/{id}
    auth_required: true

  - name: Delete Todo
    description: Delete a single todo item by clicking the delete (✕) button that appears on hover
    files:
      - app/todos/page.tsx
      - app/api/todos/[id]/route.ts
    entry_route: /todos
    user_interactions:
      - Hover over a todo item to reveal the delete button
      - Click the ✕ button to delete the todo
      - Todo is removed from the list
    api_calls:
      - method: DELETE
        endpoint: /api/todos/{id}
    auth_required: true

  - name: Filter Todos
    description: Filter the visible todo list by All, Active, or Completed tabs
    files:
      - app/todos/page.tsx
    entry_route: /todos
    user_interactions:
      - Click All tab to show all todos
      - Click Active tab to show only incomplete todos
      - Click Completed tab to show only completed todos
      - Active tab shows a badge with the count of active items
    api_calls: []
    auth_required: true

  - name: Clear Completed Todos
    description: Delete all completed todos at once with the Clear completed button
    files:
      - app/todos/page.tsx
      - app/api/todos/[id]/route.ts
    entry_route: /todos
    user_interactions:
      - Click Clear completed button in the footer (visible only when completed todos exist)
      - All completed todos are removed from the list
    api_calls:
      - method: DELETE
        endpoint: /api/todos/{id}
    auth_required: true

known_limitations: []
